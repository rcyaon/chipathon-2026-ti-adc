# 1. Design Definition
DESIGN_NAME: sar_adc_logic
VERILOG_FILES:
  - dir::../../src/sar_adc_logic/sar_adc_logic.sv # Ensure this points to your actual file location

# 2. Clock Constraints
CLOCK_PORT: clk_i
CLOCK_PERIOD: 40.0 # 25 MHz

# 3. Power and Ground Nets
VDD_NETS:
  - VDD
GND_NETS:
  - VSS

# 4. Floorplanning (Auto-sizing)
# 'relative' tells the tool to calculate the die area automatically based on gate count.
FP_SIZING: relative
FP_CORE_UTIL: 40

# 5. Power Distribution Network (PDN)
# We want standard internal power straps, NOT top-level pad connections.
PDN_CORE_RING: False
PDN_ENABLE_PINS: True # Forces the tool to create VDD/VSS pins on the macro boundary

PNR_SDC_FILE: dir::sar_adc_logic.sdc
SIGNOFF_SDC_FILE: dir::sar_adc_logic.sdc

# 6. Custom 3.3V Timing Corner
# Re-declaring all four corners (original three + new 3v30) since LIB is a
# dict-typed variable and a partial override may drop the PDK's defaults.
