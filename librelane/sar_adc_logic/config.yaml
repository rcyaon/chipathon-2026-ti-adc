# 1. Design Definition
DESIGN_NAME: sar_adc_logic
VERILOG_FILES:
  - dir::../../src/sar_adc_logic/sar_adc_logic.sv 

# 2. Clock Constraints
CLOCK_PORT: clk
CLOCK_PERIOD: 20.0 # 50 MHz

# 3. Power and Ground Nets
VDD_NETS:
  - VDD
GND_NETS:
  - VSS

# 4. Floorplanning (Absolute sizing for pin-limited macro)
FP_SIZING: absolute
DIE_AREA: [0, 0, 150, 150] # Formatted as a strict YAML list

# 5. Power Distribution Network (PDN)
PDN_MULTILAYER: false # Replaces DESIGN_IS_CORE. Uses strict boolean false.
PDN_CORE_RING: false
PDN_ENABLE_PINS: true

PNR_SDC_FILE: dir::sar_adc_logic.sdc
SIGNOFF_SDC_FILE: dir::sar_adc_logic.sdc

